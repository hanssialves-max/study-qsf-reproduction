services:
  qsf-study:
    build: .
    container_name: qsf-study
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-before-production}
      URL_PREFIX: /qsf-demo
      RAW_DATA_DIR: /data/raw
      EXPORT_DATA_DIR: /data/exports
    volumes:
      - /srv/soco-studies/data/qsf-demo/raw:/data/raw
      - /srv/soco-studies/data/qsf-demo/exports:/data/exports
    networks:
      - soco-web

networks:
  soco-web:
    external: true

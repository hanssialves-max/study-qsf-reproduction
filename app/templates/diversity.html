{% extends "base.html" %}

{% block content %}
  <section class="card wide-card">
    <h1>{{ study_title }}</h1>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" class="stack">
      {% for item in items %}
        <fieldset class="item">
          <div class="question-html">{{ item.html | safe }}</div>
          <div class="likert-row">
            {% for choice in item.choices %}
              <label class="likert-option">
                <input type="radio" name="{{ item.field_name }}" value="{{ choice.value }}" required>
                <span>{{ choice.display | safe }}</span>
              </label>
            {% endfor %}
          </div>
        </fieldset>
      {% endfor %}

      <div class="actions">
        <button class="button" type="submit">Continue</button>
      </div>
    </form>
  </section>
{% endblock %}

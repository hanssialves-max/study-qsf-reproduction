{% extends "base.html" %}

{% block content %}
  <section class="card">
    <h1>{{ study_title }}</h1>
    <form method="post" class="stack">
      <div class="question-html">{{ honey.comment.html | safe }}</div>
      <textarea class="text-area" name="{{ honey.comment.field_name }}" rows="6"></textarea>

      <div class="question-html">{{ honey.honeypot.html | safe }}</div>
      <div class="choice-list choice-list-inline">
        {% for choice in honey.honeypot.choices %}
          <label class="choice-row compact-choice">
            <input type="radio" name="{{ honey.honeypot.field_name }}" value="{{ choice.value }}" required>
            <span>{{ choice.display | safe }}</span>
          </label>
        {% endfor %}
      </div>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <div class="actions">
        <button class="button" type="submit">Continue</button>
      </div>
    </form>
  </section>
{% endblock %}

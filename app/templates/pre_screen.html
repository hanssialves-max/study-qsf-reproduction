{% extends "base.html" %}

{% block content %}
  <section class="card">
    <h1>{{ study_title }}</h1>
    <form method="post" class="stack">
      <div class="question-html">{{ pre_screen.prolific.html | safe }}</div>
      <input
        class="text-input"
        name="{{ pre_screen.prolific.field_name }}"
        type="text"
        autocomplete="off"
        value="{{ participant.prolific_pid }}"
        required
      >

      <div class="question-html">{{ pre_screen.residency.html | safe }}</div>
      <div class="choice-list">
        {% for choice in pre_screen.residency.choices %}
          <label class="choice-row">
            <input type="radio" name="{{ pre_screen.residency.field_name }}" value="{{ choice.value }}" required>
            <span>{{ choice.display | safe }}</span>
          </label>
        {% endfor %}
      </div>

      <div class="actions">
        <button class="button" type="submit">Continue</button>
      </div>
    </form>
  </section>
{% endblock %}

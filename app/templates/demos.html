{% extends "base.html" %}

{% block content %}
  <section class="card">
    <h1>{{ study_title }}</h1>
    <form method="post" class="stack">
      <div class="question-html">{{ demos.intro_html | safe }}</div>

      <div class="question-html">{{ demos.age.html | safe }}</div>
      <input class="text-input" name="{{ demos.age.field_name }}" type="text" inputmode="numeric">

      <div class="question-html">{{ demos.gender.html | safe }}</div>
      <div class="choice-list">
        {% for choice in demos.gender.choices %}
          <label class="choice-row">
            <input type="radio" name="{{ demos.gender.field_name }}" value="{{ choice.value }}" required>
            <span>{{ choice.display | safe }}</span>
          </label>
        {% endfor %}
      </div>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <div class="actions">
        <button class="button" type="submit">Continue</button>
      </div>
    </form>
  </section>
{% endblock %}
